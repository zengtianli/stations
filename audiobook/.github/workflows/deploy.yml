name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync to VPS
        run: |
          rsync -avz \
            --exclude .git --exclude .venv --exclude __pycache__ \
            --exclude .github --exclude 'audiobook.egg-info' \
            ./ root@${{ secrets.VPS_HOST }}:/var/www/audiobook/

      - name: Restart service
        run: ssh root@${{ secrets.VPS_HOST }} "systemctl restart audiobook"

      - name: Verify
        run: |
          sleep 3
          CODE=$(curl --silent -o /dev/null -w "%{http_code}" https://audiobook.tianlizeng.cloud || echo 000)
          echo "HTTP $CODE"
          [[ "$CODE" == "200" || "$CODE" == "302" ]]
