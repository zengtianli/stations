name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure remote dir
        run: ssh root@${{ secrets.VPS_HOST }} "mkdir -p /var/www/oauth-proxy/frontend"

      - name: Sync backend + frontend dist
        run: |
          scp oauth_proxy.py root@${{ secrets.VPS_HOST }}:/var/www/oauth-proxy/
          # config.json is VPS-side only (gitignored), do not overwrite
          rsync -avz --delete frontend/dist/ root@${{ secrets.VPS_HOST }}:/var/www/oauth-proxy/frontend/dist/

      - name: Restart service
        run: ssh root@${{ secrets.VPS_HOST }} "systemctl restart oauth-proxy"

      - name: Verify
        run: |
          sleep 3
          CODE=$(curl --silent -o /dev/null -w "%{http_code}" https://proxy.tianlizeng.cloud || echo 000)
          echo "HTTP $CODE"
          [[ "$CODE" == "200" || "$CODE" == "302" ]]
