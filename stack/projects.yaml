# Stack — 项目架构说明书数据源
# 每次修改后运行 generate.py 重新生成 site/index.html
# 字段说明：
#   name   显示名（若与 services.ts 的 `name` 匹配，卡片自动派生 domain/port）
#   path   本地路径（~ 展开）
#   purpose 一句话功能
#   type   web-app | desktop-app | cli | library | static-site | docs | config
#   stack  技术栈 tags
#   status active | likely-stale | archive-candidate | archived
#   notes  人工标注（比如 HANDOFF 里的自评）
# 注：domain / port 字段已废。SSOT = ~/Dev/stations/website/lib/services.ts，
#    卡片渲染时按 `name` 反查 services.ts 派生 domain + port。

