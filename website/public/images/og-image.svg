<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- 装饰性水滴图案 -->
  <circle cx="100" cy="100" r="60" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="white" opacity="0.1"/>
  <circle cx="150" cy="500" r="40" fill="white" opacity="0.08"/>
  <circle cx="1050" cy="150" r="50" fill="white" opacity="0.08"/>
  
  <!-- 主要内容区域 -->
  <g filter="url(#shadow)">
    <!-- 主标题 - 中文名 -->
    <text x="600" y="220" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" 
          font-size="100" font-weight="bold" fill="white" text-anchor="middle">
      曾田力
    </text>
    
    <!-- 副标题 - 英文名 -->
    <text x="600" y="280" font-family="'Segoe UI', Arial, sans-serif" 
          font-size="36" fill="white" text-anchor="middle" opacity="0.95">
      Tianli Zeng
    </text>
    
    <!-- 标语 -->
    <text x="600" y="360" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" 
          font-size="40" font-weight="600" fill="white" text-anchor="middle">
      数据驱动水利创新 | AI赋能未来水务
    </text>
    
    <!-- 学历和职位 -->
    <g opacity="0.9">
      <text x="600" y="440" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" 
            font-size="28" fill="white" text-anchor="middle">
        🎓 浙江大学 水利工程博士
      </text>
      <text x="600" y="485" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" 
            font-size="28" fill="white" text-anchor="middle">
        💼 浙江省水利水电规划设计院 工程师
      </text>
    </g>
    
    <!-- 网址 -->
    <text x="600" y="560" font-family="'Segoe UI', Arial, sans-serif" 
          font-size="32" fill="white" text-anchor="middle" opacity="0.95">
      tianlizeng.cloud
    </text>
  </g>
</svg>

